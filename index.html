<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ToDoList</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="todoapp">
    <header class="header">
      <h1>todos</h1>

      <input
        id="new-todo"
        class="new-todo"
        placeholder="Что нужно сделать?"
        autofocus
      />
    </header>

    <section class="main">
      <ul id="todo-list" class="todo-list"></ul>
    </section>

    <footer class="footer">
      <span id="todo-count" class="todo-count"></span>

      <ul class="filters">
        <li><a href="#" data-filter="all" class="selected">Все</a></li>
        <li><a href="#" data-filter="active">Активные</a></li>
        <li><a href="#" data-filter="completed">Завершённые</a></li>
      </ul>

      <button id="clear-completed" class="clear-completed">
        Очистить завершённые
      </button>
    </footer>
  </section>

  <script src="lib/elmish.js"></script>
  <script src="lib/todo-app.js"></script>
</body>
</html>
